<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - APNA SCHOOL</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .child-card {
            background: linear-gradient(135deg, white 0%, rgba(255, 255, 255, 0.8) 100%);
            border: 1px solid rgba(90, 63, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .child-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-color: #5A3FFF;
        }

        .child-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 6px;
            background: #5A3FFF;
        }

        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
            padding-left: var(--space-2);
        }

        .child-avatar {
            width: 60px;
            height: 60px;
            background: #f0edff;
            color: #5A3FFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .stat-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .stat-badge.success {
            background: #e6fffa;
            color: #00d9a5;
        }

        .stat-badge.danger {
            background: #fff5f5;
            color: #ff5a5a;
        }
    </style>
</head>

<body>
    <div class="animated-bg">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">🎓 APNA SCHOOL</a>
        <button class="menu-toggle" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <ul class="navbar-nav">
            <li><span class="nav-link" id="userName">Parent</span></li>
            <li><button class="btn btn-glass btn-sm" onclick="Auth.logout()">Logout</button></li>
        </ul>
    </nav>

    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <a href="parent-dashboard.html" class="sidebar-link active"><span class="sidebar-icon">👨‍👩‍👧‍👦</span>
                Dashboard</a>
            <a href="student-fees.html" class="sidebar-link"><span class="sidebar-icon">💰</span> Fee Payment</a>
            <a href="student-attendance.html" class="sidebar-link"><span class="sidebar-icon">📅</span> Attendance</a>
            <a href="student-marks.html" class="sidebar-link"><span class="sidebar-icon">📝</span> Report Cards</a>
            <a href="student-messages.html" class="sidebar-link"><span class="sidebar-icon">💬</span> Messages</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Parent Portal</h1>
            <p class="page-subtitle">Overview of your children's progress.</p>
        </div>

        <div id="childrenContainer">
            <div class="text-center p-8">
                <div class="spinner"></div>
                <p class="text-muted mt-2">Loading student profiles...</p>
            </div>
        </div>

        <div class="grid grid-2 gap-6 mt-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📢 School Circulars</h3>
                </div>
                <div id="noticeBoard" class="activity-list">
                    <!-- Circulars loaded here -->
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📞 School Contact</h3>
                </div>
                <div style="padding: 20px;">
                    <div style="margin-bottom: 12px;"><strong>Principal:</strong> Dr. Sharma</div>
                    <div style="margin-bottom: 12px;"><strong>Admin Office:</strong> +91 1234567890</div>
                    <div style="margin-bottom: 12px;"><strong>Email:</strong> help@apnaschool.edu</div>
                    <div style="margin-top: 20px;">
                        <button class="btn btn-glass w-full">Send Message</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.requireRole('parent')) return;

            const user = Auth.currentUser();
            document.getElementById('userName').textContent = user.name;

            await loadChildren(user.linkedId);
        });

        async function loadChildren(studentId) {
            await DB.ready();

            // In a real multi-child setup, linkedId might be an array or we search by guardian email.
            // For this demo, we assume linkedId is a single student ID, but we'll fetch that student.
            // If the schema supported parent -> [studentIds], we'd iter. 
            // Here we just show the one linked student.

            const student = await DB.get('students', studentId);
            if (!student) {
                document.getElementById('childrenContainer').innerHTML = '<div class="alert alert-warning">No student linked to this account.</div>';
                return;
            }

            // Fetch stats
            const attendance = await DB.getAll('attendance');
            const marks = await DB.getAll('marks');
            const fees = await DB.getAll('fees');

            // Attendance calc
            const myAtt = attendance.filter(a => a.studentId === student.id);
            const present = myAtt.filter(a => a.status === 'present').length;
            const total = myAtt.length || 1;
            const attendPct = Math.round((present / total) * 100);

            // Fee calc
            const myFees = fees.filter(f => f.studentId === student.id);
            const pending = myFees.reduce((sum, f) => sum + (f.totalAmount - f.paidAmount), 0);

            // Avg Grade
            const myMarks = marks.filter(m => m.studentId === student.id);
            const avgGrade = myMarks.length ? Math.round(myMarks.reduce((s, m) => s + (m.marksObtained / m.maxMarks * 100), 0) / myMarks.length) + '%' : 'N/A';

            const html = `
                <div class="child-card">
                    <div class="child-header">
                        <div class="flex items-center gap-4">
                            <div class="child-avatar">${Utils.getInitials(student.name)}</div>
                            <div>
                                <h3 style="font-size: 18px; font-weight: 700; color: #1a1a2e; margin: 0;">${student.name}</h3>
                                <div style="color: #666; font-size: 13px;">Class ${student.classId?.replace('cls_', '') || 'N/A'} • Roll No: ${student.rollNo}</div>
                            </div>
                        </div>
                        <a href="student-dashboard.html?viewOnly=true&id=${student.id}" class="btn btn-sm btn-glass">View Details</a>
                    </div>
                    
                    <div class="grid grid-3 gap-4" style="margin-top: 16px; border-top: 1px solid #f0f0f0; padding-top: 16px;">
                        <div class="text-center">
                            <div style="font-size: 12px; color: #888; margin-bottom: 4px;">Attendance</div>
                            <div style="font-size: 18px; font-weight: 700; color: ${attendPct < 75 ? '#ff5a5a' : '#00d9a5'};">${attendPct}%</div>
                        </div>
                        <div class="text-center" style="border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0;">
                            <div style="font-size: 12px; color: #888; margin-bottom: 4px;">Performance</div>
                            <div style="font-size: 18px; font-weight: 700; color: #5A3FFF;">${avgGrade}</div>
                        </div>
                        <div class="text-center">
                            <div style="font-size: 12px; color: #888; margin-bottom: 4px;">Fees Due</div>
                            <div style="font-size: 18px; font-weight: 700; color: ${pending > 0 ? '#ff5a5a' : '#00d9a5'};">₹${pending}</div>
                        </div>
                    </div>
                    
                    ${pending > 0 ? `
                        <div style="margin-top: 16px; text-align: right;">
                            <button class="btn btn-sm btn-primary">Pay Now</button>
                        </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('childrenContainer').innerHTML = html;

            // Circulars
            const circulars = await DB.getAll('circulars');
            const validNotices = circulars
                .filter(c => c.targetRoles.includes('parent') || c.targetRoles.includes('all'))
                .slice(0, 3);

            document.getElementById('noticeBoard').innerHTML = validNotices.map(n => `
                <div style="padding: 12px; border-bottom: 1px solid #eee;">
                    <div style="font-weight: 600;">${n.title}</div>
                    <div style="font-size: 12px; color: #666; margin-top: 2px;">${new Date(n.publishedAt).toLocaleDateString()}</div>
                </div>
             `).join('') || '<div class="p-4 text-center text-muted">No notices.</div>';
        }
    </script>
</body>

</html>

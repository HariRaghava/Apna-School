<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - APNA SCHOOL</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Safe padding for mobile */
            position: relative;
            box-sizing: border-box;
        }

        /* ... Orbs CSS remains ... */

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 4px;
            /* Standard small radius for rectangular feel */

            /* Sizing & Layout */
            width: 100%;
            max-width: 420px;
            /* Strict constraint: 380-420px */
            margin: 0 auto;

            /* Internal Spacing */
            padding: 40px;

            /* Visuals */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;

            /* Flex for vertical balance logic if content is short, though block is usually fine here */
            display: flex;
            flex-direction: column;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
                /* Smaller padding on mobile */
                max-width: 100%;
                /* Fill available space minus page padding */
            }

            .login-page {
                align-items: center;
                /* Keep centered even on small screens */
                padding: 16px;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 12px;
        }

        .login-logo {
            width: 40px;
            /* Tiny logo */
            height: 40px;
            background: linear-gradient(135deg, #5A3FFF, #4DE3FF);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 8px;
            box-shadow: 0 5px 15px rgba(90, 63, 255, 0.3);
        }

        .login-title {
            font-size: 20px;
            /* Smaller title */
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 2px 0;
        }

        .login-subtitle {
            color: #666;
            font-size: 12px;
            margin: 0;
        }

        /* Role Selector */
        .role-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        /* Compact Demo Credentials */
        .demo-credentials {
            margin-top: 16px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 6px;
            font-size: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .role-btn {
            padding: 12px 8px;
            border: 2px solid #e8e8e8;
            background: #fafafa;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 11px;
            font-weight: 600;
            color: #555;
        }

        .role-btn:hover {
            border-color: #5A3FFF;
            background: rgba(90, 63, 255, 0.05);
        }

        .role-btn.active {
            border-color: #5A3FFF;
            background: linear-gradient(135deg, rgba(90, 63, 255, 0.1), rgba(77, 227, 255, 0.1));
            color: #5A3FFF;
        }

        .role-icon {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-size: 15px;
            color: #1a1a2e;
            background: #f5f5f5;
            border: 2px solid transparent;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input::placeholder {
            color: #888;
        }

        .form-input:focus {
            background: white;
            border-color: #5A3FFF;
            box-shadow: 0 0 0 4px rgba(90, 63, 255, 0.1);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #5A3FFF, #4DE3FF);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(90, 63, 255, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(90, 63, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Error Message */
        .error-message {
            background: #FFF0F0;
            color: #D93025;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border: 1px solid rgba(217, 48, 37, 0.2);
        }

        .error-message.visible {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Demo Credentials */
        .credentials-box {
            background: linear-gradient(135deg, rgba(90, 63, 255, 0.08), rgba(77, 227, 255, 0.08));
            border: 1px solid rgba(90, 63, 255, 0.15);
            border-radius: 14px;
            padding: 16px 20px;
            margin-top: 24px;
        }

        .credentials-box h4 {
            font-size: 13px;
            font-weight: 600;
            color: #5A3FFF;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .credential-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .credential-item {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
        }

        .credential-item .role {
            color: #888;
            font-weight: 500;
        }

        .credential-item .creds {
            color: #1a1a2e;
            font-family: monospace;
            font-weight: 600;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #5A3FFF;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #4DE3FF;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .login-card {
                padding: 32px 24px;
            }

            .role-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .credential-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">🎓</div>
                    <h1 class="login-title">Welcome Back!</h1>
                    <p class="login-subtitle">Sign in to your APNA SCHOOL account</p>
                </div>

                <!-- Role Selector -->
                <div class="role-selector">
                    <button type="button" class="role-btn active" data-role="admin" onclick="selectRole('admin')">
                        <span class="role-icon">⚙️</span>Admin
                    </button>
                    <button type="button" class="role-btn" data-role="faculty" onclick="selectRole('faculty')">
                        <span class="role-icon">👨‍🏫</span>Faculty
                    </button>
                    <button type="button" class="role-btn" data-role="student" onclick="selectRole('student')">
                        <span class="role-icon">👨‍🎓</span>Student
                    </button>
                    <button type="button" class="role-btn" data-role="parent" onclick="selectRole('parent')">
                        <span class="role-icon">👪</span>Parent
                    </button>
                    <button type="button" class="role-btn" data-role="developer" onclick="selectRole('developer')">
                        <span class="role-icon">💻</span>Dev
                    </button>
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage">
                    <span>⚠️</span>
                    <span id="errorText"></span>
                </div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" class="form-input" id="username" placeholder="Enter your username"
                                required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" class="form-input" id="password" placeholder="Enter your password"
                                required autocomplete="current-password">
                        </div>
                    </div>

                    <input type="hidden" id="selectedRole" value="admin">

                    <button type="submit" class="login-btn" id="loginBtn">
                        Sign In →
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="credentials-box">
                    <h4>🔑 Demo Credentials</h4>
                    <div class="credential-grid">
                        <div class="credential-item">
                            <div class="role">Admin</div>
                            <div class="creds">admin / admin123</div>
                        </div>
                        <div class="credential-item">
                            <div class="role">Faculty</div>
                            <div class="creds">rajesh_t / faculty123</div>
                        </div>
                        <div class="credential-item">
                            <div class="role">Student</div>
                            <div class="creds">aarav_s / student123</div>
                        </div>
                        <div class="credential-item">
                            <div class="role">Parent</div>
                            <div class="creds">sharma_p1 / parent123</div>
                        </div>
                        <div class="credential-item" style="grid-column: span 2;">
                            <div class="role">Developer</div>
                            <div class="creds">dev / dev123</div>
                        </div>
                    </div>
                </div>

                <div class="login-footer">
                    <a href="index.html" class="back-link">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        let selectedRole = 'admin';

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('role')) {
                selectRole(params.get('role'));
            }

            if (Auth.isLoggedIn()) {
                const user = Auth.currentUser();
                Auth.redirectToDashboard(user.role);
            }
        });

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('selectedRole').value = role;

            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.role === role) {
                    btn.classList.add('active');
                }
            });
        }

        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('selectedRole').value;
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('visible');

            if (!username || !password) {
                errorText.textContent = 'Please enter both username and password';
                errorEl.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const result = await Auth.login(username, password, role);

                if (result.success) {
                    Utils.showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        Auth.redirectToDashboard(role);
                    }, 500);
                } else {
                    errorText.textContent = result.error || 'Invalid credentials';
                    errorEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'Sign In →';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorText.textContent = 'An error occurred. Please try again.';
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        }
    </script>
</body>

</html>
